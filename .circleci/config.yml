version: 2.1

jobs:
  backend:
    docker:
      - image: cimg/python:3.10
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install Backend Dependencies
          command: |
            cd backend
            pip install -r requirements.txt
      - run:
          name: Django System Check
          command: |
            cd backend
            SECRET_KEY=ci-secret-key python manage.py check

  frontend:
    docker:
      - image: cimg/node:18.19
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install Frontend Dependencies
          command: |
            cd frontend
            npm install
      - run:
          name: Build React App
          command: |
            cd frontend
            npm run build

workflows:
  version: 2
  build_and_test:
    jobs:
      - backend
      - frontend